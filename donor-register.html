<!-- Donor Registration Form -->

<section class="form-section">

<h1>Donor Registration</h1>

<form class="donor-form" id="donorForm">

<label for="name">Full Name</label>
<input type="text" id="donorName" name="name" placeholder="Enter your name" required>

<label for="age">Age</label>
<input type="number" id="age" name="age" placeholder="Enter your age" required>

<label for="weight">Weight (kg)</label>
<input type="number" id="weight" name="weight" placeholder="Enter your weight" required>

<label for="infection">Severe Infection</label>
<select id="infection" name="infection" required>

<option value="">Select</option>
<option value="No">No</option>
<option value="Yes">Yes</option>

</select>

<label for="bloodgroup">Blood Group</label>
<select id="bloodGroup" name="bloodgroup" required>

<option value="">Select Blood Group</option>
<option value="A+">A+</option>
<option value="A-">A-</option>
<option value="B+">B+</option>
<option value="B-">B-</option>
<option value="AB+">AB+</option>
<option value="AB-">AB-</option>
<option value="O+">O+</option>
<option value="O-">O-</option>

</select>

<label for="city">City</label>
<input type="text" id="city" name="city" placeholder="Enter your city" required>

<label for="phone">Phone Number</label>
<input type="tel" id="contact" name="phone" placeholder="Enter phone number" required>

<label for="date">Last Donation Date</label>
<input type="date" id="date" name="date">

<button type="submit" class="btn">Register Donor</button>

</form>

</section>
