<!-- Blood Request Form -->

<section class="form-section">

<h1>Request Blood</h1>

<form class="donor-form" id="requestForm">

<label for="patientname">Patient Name</label>
<input type="text" id="patientName" name="patientname" placeholder="Enter patient name" required>


<label for="bloodgroup">Blood Group Required</label>
<select id="requestBloodGroup" name="bloodgroup" required>

<option value="">Select Blood Group</option>
<option value="A+">A+</option>
<option value="A-">A-</option>
<option value="B+">B+</option>
<option value="B-">B-</option>
<option value="AB+">AB+</option>
<option value="AB-">AB-</option>
<option value="O+">O+</option>
<option value="O-">O-</option>

</select>


<label for="units">Units Required</label>
<input type="number" id="units" name="units" placeholder="Enter number of units" required>


<label for="city">City</label>
<input type="text" id="requestCity" name="city" placeholder="Enter city" required>


<label for="contact">Contact Number</label>
<input type="tel" id="requestContact" name="contact" placeholder="Enter contact number" required>


<label for="urgency">Emergency Level</label>

<select id="emergencyLevel" name="urgency" required>

<option value="">Select Emergency Level</option>
<option value="Normal">Normal</option>
<option value="Urgent">Urgent</option>

</select>


<button type="submit" class="btn">Request Blood</button>

</form>

</section>
